# Fallback / manual-tag workflow. Builds the portable single-file Vimium.exe
# and publishes a GitHub release. Triggered by pushing a version tag (e.g.
# `git tag v1.4.3 && git push origin v1.4.3`).
#
# For routine releases, use the **bump-version** workflow from the Actions tab
# instead — it bumps SolutionInfo.cs, builds, commits, and releases in one go.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write      # create the GitHub release + upload assets
  id-token: write      # Azure OIDC login (only used when signing is enabled)

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Read version from SolutionInfo.cs (the single source of truth) ──
      - name: Read version from SolutionInfo.cs
        id: version
        shell: pwsh
        run: |
          $info = Get-Content src/SolutionInfo.cs -Raw
          $ver = [regex]::Match($info, 'internal const string Version = "([^"]+)"').Groups[1].Value
          if (-not $ver) { Write-Error "Could not parse version from SolutionInfo.cs"; exit 1 }
          Write-Host "SolutionInfo version: $ver"
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish portable single-file exe
        shell: pwsh
        run: >
          dotnet publish src/Vimium/Vimium.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/win-x64

      # ── Publish the GitHub release ──────────────────────────────────────
      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          if ("${{ github.ref_type }}" -ne "tag") { $tag = "manual-$($env:GITHUB_SHA.Substring(0,7))" }
          $label = "Vimium.exe (portable, unsigned)"
          $notes = if (Test-Path CHANGELOG.md) { "See CHANGELOG.md for release notes." } else { "" }
          gh release create $tag `
            --repo ${{ github.repository }} `
            --title "Vimium v$version" `
            --notes "$notes" `
            "publish/win-x64/Vimium.exe#$label"
