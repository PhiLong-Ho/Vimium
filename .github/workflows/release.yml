# Fallback / manual-tag workflow. Builds the portable single-file Vimium.exe
# and publishes a GitHub release. Triggered by pushing a version tag (e.g.
# `git tag v1.4.3 && git push origin v1.4.3`).
#
# For routine releases, use the **bump-version** workflow from the Actions tab
# instead — it bumps SolutionInfo.cs, builds, commits, and releases in one go.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write      # create the GitHub release + upload assets
  id-token: write      # Azure OIDC login (only used when signing is enabled)

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Read version from SolutionInfo.cs (the single source of truth) ──
      - name: Read version from SolutionInfo.cs
        id: version
        shell: pwsh
        run: |
          $info = Get-Content src/SolutionInfo.cs -Raw
          $ver = [regex]::Match($info, 'internal const string Version = "([^"]+)"').Groups[1].Value
          if (-not $ver) { Write-Error "Could not parse version from SolutionInfo.cs"; exit 1 }
          Write-Host "SolutionInfo version: $ver"
          "version=$ver" >> $env:GITHUB_OUTPUT

      # ── Build for all architectures ─────────────────────────────────
      - name: Publish (x64)
        shell: pwsh
        run: >
          dotnet publish src/Vimium/Vimium.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/win-x64

      - name: Publish (x86)
        shell: pwsh
        run: >
          dotnet publish src/Vimium/Vimium.csproj
          -c Release -r win-x86 --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/win-x86

      - name: Publish (arm64)
        shell: pwsh
        run: >
          dotnet publish src/Vimium/Vimium.csproj
          -c Release -r win-arm64 --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/win-arm64

      # ── Publish the GitHub release ──────────────────────────────────────
      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          if ("${{ github.ref_type }}" -ne "tag") { $tag = "manual-$($env:GITHUB_SHA.Substring(0,7))" }
          $notes = if (Test-Path CHANGELOG.md) { "See CHANGELOG.md for release notes." } else { "" }

          # Verify all builds produced output
          @("publish/win-x64/Vimium.exe", "publish/win-x86/Vimium.exe", "publish/win-arm64/Vimium.exe") | ForEach-Object {
            if (-not (Test-Path $_)) { Write-Error "Missing: $_"; exit 1 }
            Write-Host "Found: $_ ($((Get-Item $_).Length) bytes)"
          }

          # Create the release first (no assets), then upload with retry —
          # GitHub's upload endpoint can 404 for a few seconds after creation
          gh release create $tag `
            --repo ${{ github.repository }} `
            --title "Vimium v$version" `
            --notes "$notes"

          $assets = @(
            "publish/win-x64/Vimium.exe#Vimium.exe (x64, portable)",
            "publish/win-x86/Vimium.exe#Vimium.exe (x86, portable)",
            "publish/win-arm64/Vimium.exe#Vimium.exe (arm64, portable)"
          )
          $maxRetries = 5
          for ($i = 0; $i -lt $maxRetries; $i++) {
            $result = gh release upload $tag --repo ${{ github.repository }} $assets 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Assets uploaded successfully"
              break
            }
            Write-Host "Upload attempt $($i+1)/$maxRetries failed, retrying in 3s..."
            Start-Sleep -Seconds 3
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Upload failed after $maxRetries attempts"
            exit 1
          }
